<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Healer and Destroyer</title>
    <style>
      :root {
        color-scheme: dark;
        font-family: "Trebuchet MS", "Segoe UI", sans-serif;
        background: radial-gradient(circle at top, #152337, #081018 55%, #03070b 100%);
        color: #e9f2ff;
      }

      body {
        margin: 0;
        overflow: hidden;
      }

      #app {
        width: 100vw;
        height: 100vh;
      }

      #hud {
        position: fixed;
        top: 16px;
        left: 16px;
        display: grid;
        gap: 8px;
        padding: 12px 14px;
        background: rgba(5, 10, 16, 0.72);
        border: 1px solid rgba(132, 204, 255, 0.25);
        border-radius: 14px;
        backdrop-filter: blur(12px);
        min-width: 220px;
      }

      #hud.minimized {
        min-width: 180px;
      }

      .hud-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
      }

      .hud-toggle {
        padding: 6px 10px;
        margin: 0;
        font-size: 0.78rem;
      }

      .hud-body {
        display: grid;
        gap: 6px;
      }

      #builder {
        position: fixed;
        right: 16px;
        top: 16px;
        width: 360px;
        max-height: calc(100vh - 32px);
        overflow: auto;
        padding: 14px;
        border-radius: 18px;
        border: 1px solid rgba(111, 234, 208, 0.25);
        background: rgba(10, 18, 22, 0.78);
        display: none;
      }

      #builder.visible {
        display: block;
      }

      #notifications {
        position: fixed;
        left: 16px;
        bottom: 16px;
        display: grid;
        gap: 10px;
        width: min(360px, calc(100vw - 32px));
        pointer-events: none;
      }

      .toast {
        padding: 12px 14px;
        border-radius: 14px;
        border: 1px solid rgba(111, 234, 208, 0.28);
        background: rgba(8, 18, 24, 0.88);
        box-shadow: 0 10px 28px rgba(0, 0, 0, 0.28);
      }

      .toast-title {
        margin: 0 0 4px;
        color: #73f3ca;
        font-size: 0.92rem;
      }

      .toast-body {
        margin: 0;
        color: rgba(233, 242, 255, 0.82);
        font-size: 0.86rem;
      }

      button {
        border: 0;
        border-radius: 999px;
        padding: 10px 14px;
        margin: 0 8px 8px 0;
        background: linear-gradient(135deg, #49c6ff, #73f3ca);
        color: #04131c;
        font-weight: 700;
        cursor: pointer;
      }

      button[disabled] {
        cursor: default;
        opacity: 0.45;
        filter: saturate(0.6);
      }

      .panel-title {
        margin: 0;
        font-size: 0.95rem;
        text-transform: uppercase;
        letter-spacing: 0.08em;
        color: #8cc8ff;
      }

      .ship-card {
        margin-top: 10px;
        padding: 10px;
        border-radius: 14px;
        background: rgba(255, 255, 255, 0.04);
      }

      .section-label {
        margin: 14px 0 6px;
        font-size: 0.9rem;
        color: #8cc8ff;
      }

      .build-progress {
        margin: 8px 0;
        height: 8px;
        border-radius: 999px;
        overflow: hidden;
        background: rgba(255, 255, 255, 0.08);
      }

      .build-progress-fill {
        height: 100%;
        border-radius: 999px;
        background: linear-gradient(90deg, #49c6ff, #73f3ca);
      }

      .muted-copy {
        color: rgba(233, 242, 255, 0.68);
      }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <div id="hud"></div>
    <div id="builder"></div>
    <div id="notifications"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
